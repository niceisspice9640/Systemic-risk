<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Adjusted incident trend with OLS regression</title></head>
<body>
<div style="max-width:800px;margin:0 auto;font-family:Arial,sans-serif;">
<div style="position:relative;width:100%;height:400px;">
<canvas id="chart" role="img" aria-label="Scatter of rule-adjusted EuRepoC cyber incidents per year 2015-2024 with fitted OLS trend line rising about 32 incidents per year, p equals 0.016, R squared 0.53, and a 95 percent confidence band."></canvas>
</div>
<p style="font-size:12px;color:#666;text-align:center;">Rule-adjusted annual incidents with OLS trend line and 95% confidence interval. Source: EuRepoC v1.3.2. n=10.</p>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const years=[2015,2016,2017,2018,2019,2020,2021,2022,2023,2024];
const adj=[131,166,134,120,90,69,148,316,445,399];
const fit=[56.2,88.6,120.9,153.3,185.6,218.0,250.3,282.7,315.0,347.4];
const lo=[-75.3,-23.0,27.1,73.4,113.8,146.1,170.5,188.9,203.5,215.9];
const hi=[187.7,200.1,214.7,233.1,257.5,289.8,330.2,376.5,426.6,478.9];
new Chart(document.getElementById('chart'),{
  type:'line',
  data:{labels:years,datasets:[
    {label:'95% confidence interval',data:hi,borderColor:'transparent',backgroundColor:'rgba(176,58,46,0.12)',pointRadius:0,fill:'+1'},
    {label:'_lo',data:lo,borderColor:'transparent',backgroundColor:'rgba(176,58,46,0.12)',pointRadius:0,fill:false},
    {label:'OLS trend (+32/yr, p=0.016, R²=0.53)',data:fit,borderColor:'#B03A2E',borderWidth:2,pointRadius:0,fill:false},
    {label:'Adjusted incidents (observed)',data:adj,borderColor:'#0F6E56',backgroundColor:'#0F6E56',showLine:false,pointRadius:4}
  ]},
  options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'top',labels:{filter:i=>i.text!=='_lo'}}},
    scales:{y:{beginAtZero:true,title:{display:true,text:'Incidents (rule-adjusted)'}}}}
});
</script>
</body></html>
