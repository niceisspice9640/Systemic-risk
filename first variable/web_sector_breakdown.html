<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Incidents by sector 2015-2024</title></head>
<body>
<div style="max-width:800px;margin:0 auto;font-family:Arial,sans-serif;">
<div style="position:relative;width:100%;height:380px;">
<canvas id="chart" role="img" aria-label="Stacked bar chart of EuRepoC incidents by sector category, deduplicated, by year"></canvas>
</div>
<p style="font-size:12px;color:#666;text-align:center;">Source: EuRepoC Global Dataset of Cyber Incidents v1.3.2</p>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

new Chart(document.getElementById('chart'), {
  type: 'bar',
  data: {
    labels: [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024],
    datasets: [{ label: 'Critical infrastructure', data: [23, 37, 42, 29, 24, 26, 54, 159, 432, 402], backgroundColor: '#D85A30' },
{ label: 'State institutions / political system', data: [84, 116, 73, 70, 55, 41, 90, 170, 300, 296], backgroundColor: '#185FA5' },
{ label: 'Corporate Targets', data: [19, 24, 23, 25, 22, 12, 29, 70, 74, 58], backgroundColor: '#BA7517' },
{ label: 'Social groups', data: [15, 23, 19, 10, 14, 11, 17, 20, 18, 19], backgroundColor: '#7F77DD' },
{ label: 'Media', data: [18, 19, 16, 10, 12, 6, 17, 22, 21, 20], backgroundColor: '#D4537E' },
{ label: 'Education', data: [0, 1, 1, 0, 1, 4, 5, 12, 86, 74], backgroundColor: '#1D9E75' },
{ label: 'Science', data: [4, 8, 10, 8, 9, 7, 7, 10, 1, 1], backgroundColor: '#639922' },
{ label: 'Other', data: [4, 3, 1, 6, 2, 1, 1, 6, 2, 4], backgroundColor: '#888780' }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { position: 'top' } },
    scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true, title: { display: true, text: 'Incidents (deduplicated)' } } }
  }
});

</script>
</body></html>
